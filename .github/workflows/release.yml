# M31 一键运行:为 Windows / Linux 构建**独立可执行文件**并挂到 GitHub Release。
# 触发:推 v* tag(如 v0.12.0),或手动 workflow_dispatch。用户从 Releases 下载即用,
# 双击 → 起服务 + 自动开浏览器聊天页,零 Python / 零 clone。
name: release-binaries

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write        # 上传产物到 Release 需要

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: memory-agent-linux-x86_64
            bin: memory-agent
          - os: windows-latest
            asset: memory-agent-windows-x86_64.exe
            bin: memory-agent.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: 安装 uv
        uses: astral-sh/setup-uv@v5
      - name: 装依赖(不含重的本地嵌入 extra)
        run: uv sync
      - name: PyInstaller 打包单文件
        run: uv run --with pyinstaller pyinstaller --clean --distpath dist --workpath build packaging/memory-agent.spec
      - name: 冒烟自检(起服务 → 探 /healthz → 停)
        shell: bash
        run: |
          ./dist/${{ matrix.bin }} --no-browser --port 8099 &
          PID=$!
          for i in $(seq 1 30); do
            if curl -fs http://127.0.0.1:8099/healthz >/dev/null; then echo "healthz OK"; break; fi
            sleep 1
          done
          curl -fs http://127.0.0.1:8099/healthz || { echo "binary 自检失败"; kill $PID; exit 1; }
          kill $PID 2>/dev/null || true
      - name: 重命名产物
        shell: bash
        run: |
          mkdir -p out
          cp "dist/${{ matrix.bin }}" "out/${{ matrix.asset }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: out/${{ matrix.asset }}
      - name: 挂到 Release(仅 tag 触发)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: out/${{ matrix.asset }}
          draft: true
          generate_release_notes: true
