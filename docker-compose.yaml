# PHASE2.5 M-C:docker compose up -d 后系统完整可用(无 GPU 依赖)。
# 服务清单三个:qdrant / memory-api / mcp-server(同镜像不同入口,理由见 README)。
# 密钥全部经 .env 注入(模板 .env.example);数据/日志/导出挂 volume。
#
# 本地推理路径保留:--profile gpu 追加 vllm(PHASE 1 形态,一键切回
# MEMORY_AGENT_LLM__MODE=local)。

services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports:
      - "6333:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  memory-api:
    build: .
    image: memory-agent:latest
    env_file:
      - path: .env          # 密钥经向导写入;缺失时不报错,由应用 /healthz 分层 fail-fast
        required: false
    environment:
      MEMORY_AGENT_VECTORDB__URL: http://qdrant:6333
      MEMORY_AGENT_BUDGET__LEDGER_PATH: /app/data/cost_ledger.json
      MEMORY_AGENT_IDENTITY__DIR: /app/data/identity
      MEMORY_AGENT_METABOLISM__EVENTS_PATH: /app/logs/retrieval_events.jsonl
      MEMORY_AGENT_METABOLISM__REPORT_DIR: /app/reports
    ports:
      - "8002:8002"
    volumes:
      - ./data/agent:/app/data
      - ./logs:/app/logs
      - ./exports:/app/exports
      - ./reports:/app/reports
    depends_on:
      qdrant:
        condition: service_healthy
    # /healthz 逐项报告 LLM 端点、嵌入端点、Qdrant 三依赖(镜像内置 HEALTHCHECK)

  # MCP server:同一镜像、不同入口(stdio 按需拉起,不常驻端口)
  # 用法:docker compose --profile mcp run --rm mcp-server
  # 与 memory-api 经同一 Qdrant collection 共享记忆状态
  mcp-server:
    image: memory-agent:latest
    profiles: ["mcp"]
    env_file:
      - path: .env
        required: false
    environment:
      MEMORY_AGENT_VECTORDB__URL: http://qdrant:6333
      MEMORY_AGENT_BUDGET__LEDGER_PATH: /app/data/cost_ledger.json
      MEMORY_AGENT_IDENTITY__DIR: /app/data/identity
    volumes:
      - ./data/agent:/app/data
      - ./logs:/app/logs
    depends_on:
      qdrant:
        condition: service_healthy
    stdin_open: true
    command: ["python", "-m", "services.mcp_server"]
    healthcheck:
      test: ["CMD", "python", "-c", "import services.mcp_server"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ---- 本地推理路径(PHASE 1 保留,一键切回) ----
  vllm:
    image: vllm/vllm-openai:latest
    profiles: ["gpu"]
    ports:
      - "8000:8000"
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
    volumes:
      - hf_cache:/root/.cache/huggingface
    command: >
      --model ${VLLM_MODEL:?set VLLM_MODEL from config.yaml llm.model_by_tier}
      --served-model-name gemma-4
      --enable-chunked-prefill
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request;urllib.request.urlopen('http://127.0.0.1:8000/v1/models')\""]
      interval: 15s
      timeout: 5s
      retries: 60

volumes:
  hf_cache:
